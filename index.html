<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notaufnahme</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .app {
      background: white;
      border-radius: 20px;
      width: 100%;
      max-width: 480px;
      min-height: 600px;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .screen { display: none; flex-direction: column; flex: 1; }
    .screen.active { display: flex; }

    .progress { display: flex; gap: 6px; margin-bottom: 2rem; }
    .progress-dot {
      height: 6px; border-radius: 3px; background: #e0e0e0;
      flex: 1; transition: background 0.3s;
    }
    .progress-dot.done { background: #2196F3; }

    .screen-title { font-size: 1.1rem; color: #555; text-align: center; margin-bottom: 1.5rem; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: auto; }

    .option-btn {
      background: #f8f9fa; border: 2px solid #e0e0e0; border-radius: 16px;
      padding: 1rem 0.5rem; cursor: pointer; display: flex; flex-direction: column;
      align-items: center; gap: 8px; transition: all 0.15s;
    }
    .option-btn:hover { border-color: #90CAF9; background: #E3F2FD; }
    .option-btn.selected { border-color: #2196F3; background: #E3F2FD; }
    .option-btn .emoji { font-size: 2.5rem; }
    .option-btn .label { font-size: 0.8rem; color: #555; text-align: center; }

    .next-btn {
      margin-top: 1.5rem; background: #2196F3; color: white; border: none;
      border-radius: 14px; padding: 1rem; font-size: 1rem; cursor: pointer;
      width: 100%; transition: opacity 0.15s;
    }
    .next-btn:disabled { opacity: 0.3; cursor: default; }
    .next-btn:hover:not(:disabled) { opacity: 0.85; }

    .lang-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: auto; }
    .lang-btn {
      background: #f8f9fa; border: 2px solid #e0e0e0; border-radius: 14px;
      padding: 0.85rem; cursor: pointer; font-size: 0.95rem; transition: all 0.15s;
    }
    .lang-btn:hover { border-color: #90CAF9; background: #E3F2FD; }
    .lang-btn.selected { border-color: #2196F3; background: #E3F2FD; }

    .body-wrap { display: flex; justify-content: center; margin-bottom: 1rem; }
    .body-map { position: relative; width: 160px; height: 320px; }
    .zone {
      position: absolute; border-radius: 10px; border: 2px solid #90CAF9;
      background: #E3F2FD; cursor: pointer; display: flex; align-items: center;
      justify-content: center; font-size: 1.2rem; transition: all 0.15s;
    }
    .zone:hover { background: #BBDEFB; }
    .zone.selected { background: #2196F3; border-color: #1565C0; }

    .face-row { display: flex; justify-content: space-around; margin-bottom: 1rem; padding: 0.5rem 0; }
    .face-btn {
      font-size: 2.5rem; background: none; border: 2px solid transparent;
      border-radius: 14px; padding: 0.5rem; cursor: pointer; transition: all 0.15s;
    }
    .face-btn:hover { border-color: #90CAF9; background: #E3F2FD; }
    .face-btn.selected { border-color: #2196F3; background: #E3F2FD; }

    .summary-card { background: #f8f9fa; border-radius: 14px; padding: 1rem; margin-bottom: 10px; }
    .summary-label { font-size: 0.75rem; color: #999; margin-bottom: 4px; text-transform: uppercase; }
    .summary-value { font-size: 1rem; color: #222; font-weight: 500; }

    .number-badge { font-size: 5rem; font-weight: 700; color: #2196F3; text-align: center; margin: 1rem 0; }
    .number-label { text-align: center; color: #555; font-size: 0.95rem; margin-bottom: 1.5rem; }

    .welcome-icon { font-size: 5rem; text-align: center; margin-bottom: 1rem; }
    .welcome-title { font-size: 1.5rem; font-weight: 600; text-align: center; color: #222; margin-bottom: 0.5rem; }
    .welcome-sub { font-size: 0.9rem; color: #888; text-align: center; margin-bottom: 1.5rem; }

    .bio-gender-row { display: flex; gap: 12px; justify-content: center; margin-bottom: auto; }
    .bio-gender-btn {
      flex: 1; background: #f8f9fa; border: 2px solid #e0e0e0; border-radius: 16px;
      padding: 2rem 1rem; cursor: pointer; display: flex; flex-direction: column;
      align-items: center; gap: 8px; transition: background 0.15s, border-color 0.15s;
      font-size: 1rem; color: #555;
    }
    .bio-gender-btn:hover { background: #E3F2FD; }
    .bio-gender-btn.selected { background: #E3F2FD; }
    .bio-gender-btn .symbol { font-size: 3.5rem; line-height: 1; font-weight: bold; }

    .loading-overlay {
      display: none; position: absolute; inset: 0; background: rgba(255,255,255,0.88);
      border-radius: 20px; align-items: center; justify-content: center;
      z-index: 10; flex-direction: column; gap: 1rem;
    }
    .loading-overlay.active { display: flex; }
    .spinner {
      width: 36px; height: 36px; border: 4px solid #e0e0e0;
      border-top-color: #2196F3; border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="app" id="app">
  <div class="loading-overlay" id="loading-overlay"><div class="spinner"></div></div>

  <!-- Screen 0: Willkommen -->
  <div class="screen active" id="s0">
    <div style="flex:1; display:flex; flex-direction:column; justify-content:center;">
      <div class="welcome-icon">🏥</div>
      <div class="welcome-title" data-i18n="welcome_title">Willkommen</div>
      <div class="welcome-sub" data-i18n="welcome_sub">Bitte wähle deine Sprache</div>
      <div class="lang-grid">
        <button class="lang-btn selected" data-lang="de" onclick="selectLang(this)">🇩🇪 Deutsch</button>
        <button class="lang-btn" data-lang="en" onclick="selectLang(this)">🇬🇧 English</button>
        <button class="lang-btn" data-lang="tr" onclick="selectLang(this)">🇹🇷 Türkçe</button>
        <button class="lang-btn" data-lang="ar" onclick="selectLang(this)">🇸🇦 العربية</button>
        <button class="lang-btn" data-lang="ru" onclick="selectLang(this)">🇷🇺 Русский</button>
        <button class="lang-btn" data-lang="pl" onclick="selectLang(this)">🇵🇱 Polski</button>
      </div>
    </div>
    <button class="next-btn" onclick="goto(1)" data-i18n="next">Weiter →</button>
  </div>

  <!-- Screen 1: Wer bist du -->
  <div class="screen" id="s1">
    <div class="progress" id="prog1"></div>
    <div class="screen-title" data-i18n="s1_title">Wer bist du?</div>
    <div class="grid">
      <button class="option-btn" onclick="selectOne(this,'who','who_self')">
        <span class="emoji">👨👩</span><span class="label" data-i18n="who_self">Ich selbst</span>
      </button>
      <button class="option-btn" onclick="selectOne(this,'who','who_child')">
        <span class="emoji">👶</span><span class="label" data-i18n="who_child">Mein Kind</span>
      </button>
      <button class="option-btn" onclick="selectOne(this,'who','who_parent')">
        <span class="emoji">👴👵</span><span class="label" data-i18n="who_parent">Elternteil</span>
      </button>
      <button class="option-btn" onclick="selectOne(this,'who','who_other')">
        <span class="emoji">👥</span><span class="label" data-i18n="who_other">Andere Person</span>
      </button>
    </div>
    <button class="next-btn" id="next1" disabled onclick="goto(2)" data-i18n="next">Weiter →</button>
  </div>

  <!-- Screen 2: Biologisches Geschlecht -->
  <div class="screen" id="s2">
    <div class="progress" id="prog2"></div>
    <div class="screen-title" data-i18n="s2_title">Biologisches Geschlecht</div>
    <div class="bio-gender-row">
      <button class="bio-gender-btn" data-color="#2196F3" onclick="selectGender2(this,'gender_m')">
        <span class="symbol" style="color:#2196F3">♂</span>
        <span data-i18n="gender_m">Männlich</span>
      </button>
      <button class="bio-gender-btn" data-color="#E91E8C" onclick="selectGender2(this,'gender_f')">
        <span class="symbol" style="color:#E91E8C">♀</span>
        <span data-i18n="gender_f">Weiblich</span>
      </button>
    </div>
    <button class="next-btn" id="next2" disabled onclick="goto(3)" data-i18n="next">Weiter →</button>
  </div>

  <!-- Screen 3: Alter -->
  <div class="screen" id="s3">
    <div class="progress" id="prog3"></div>
    <div class="screen-title" data-i18n="sage_title">Wie alt?</div>
    <div class="grid">
      <button class="option-btn" onclick="selectAge(this,'age_child')">
        <span class="emoji">👦👧</span><span class="label" data-i18n="age_child">Kind (0–12)</span>
      </button>
      <button class="option-btn" onclick="selectAge(this,'age_teen')">
        <span class="emoji">🧑👩</span><span class="label" data-i18n="age_teen">Jugendlich (13–17)</span>
      </button>
      <button class="option-btn" onclick="selectAge(this,'age_adult')">
        <span class="emoji">👨👩</span><span class="label" data-i18n="age_adult">Erwachsen (18–60)</span>
      </button>
      <button class="option-btn" onclick="selectAge(this,'age_senior')">
        <span class="emoji">👴👵</span><span class="label" data-i18n="age_senior">Senior (60+)</span>
      </button>
    </div>
    <button class="next-btn" id="next3" disabled onclick="goto(4)" data-i18n="next">Weiter →</button>
  </div>

  <!-- Screen 4: Körperstelle -->
  <div class="screen" id="s4">
    <div class="progress" id="prog4"></div>
    <div class="screen-title" data-i18n="s3_title">Wo tut es weh?</div>
    <div class="body-wrap">
      <div class="body-map">
        <div class="zone" style="left:40px;top:0;width:80px;height:70px;" onclick="selectZone(this,'Kopf')">😣</div>
        <div class="zone" style="left:30px;top:78px;width:100px;height:60px;" onclick="selectZone(this,'Brust')">💓</div>
        <div class="zone" style="left:30px;top:146px;width:100px;height:60px;" onclick="selectZone(this,'Bauch')">🫄</div>
        <div class="zone" style="left:0;top:78px;width:28px;height:80px;" onclick="selectZone(this,'Linker Arm')">💪</div>
        <div class="zone" style="right:0;top:78px;width:28px;height:80px;" onclick="selectZone(this,'Rechter Arm')">💪</div>
        <div class="zone" style="left:30px;top:214px;width:44px;height:100px;" onclick="selectZone(this,'Linkes Bein')">🦵</div>
        <div class="zone" style="right:30px;top:214px;width:44px;height:100px;" onclick="selectZone(this,'Rechtes Bein')">🦵</div>
      </div>
    </div>
    <div id="zone-hint" style="text-align:center;font-size:0.85rem;color:#999;margin-bottom:0.5rem;" data-i18n="zone_hint">Bereich antippen</div>
    <button class="next-btn" id="next4" disabled onclick="gotoFollowup()" data-i18n="next">Weiter →</button>
  </div>

  <!-- Screen 5: Folgefragen -->
  <div class="screen" id="s5">
    <div class="progress" id="prog5"></div>
    <div class="screen-title" id="followup-title">Folgefragen</div>
    <div class="grid" id="followup-grid" style="margin-bottom:auto;"></div>
    <button class="next-btn" id="next5" disabled onclick="gotoFromFollowup()" data-i18n="next">Weiter →</button>
  </div>

  <!-- Screen 6: Schmerz -->
  <div class="screen" id="s6">
    <div class="progress" id="prog6"></div>
    <div class="screen-title" data-i18n="s5_title">Wie stark sind die Schmerzen?</div>
    <div class="face-row">
      <button class="face-btn" onclick="selectPain(this,'pain_1')">😊</button>
      <button class="face-btn" onclick="selectPain(this,'pain_3')">🙂</button>
      <button class="face-btn" onclick="selectPain(this,'pain_5')">😐</button>
      <button class="face-btn" onclick="selectPain(this,'pain_7')">😟</button>
      <button class="face-btn" onclick="selectPain(this,'pain_9')">😭</button>
      <button class="face-btn" onclick="selectPain(this,'pain_10')">😱</button>
    </div>
    <button class="next-btn" id="next6" disabled onclick="goto(7)" data-i18n="next">Weiter →</button>
  </div>

  <!-- Screen 7: Seit wann -->
  <div class="screen" id="s7">
    <div class="progress" id="prog7"></div>
    <div class="screen-title" data-i18n="s6_title">Seit wann?</div>
    <div class="grid">
      <button class="option-btn" onclick="selectOne(this,'since','since_1h')">
        <span class="emoji">⏱️</span><span class="label" data-i18n="since_1h">Weniger als 1 Stunde</span>
      </button>
      <button class="option-btn" onclick="selectOne(this,'since','since_24h')">
        <span class="emoji">🕐</span><span class="label" data-i18n="since_24h">1–24 Stunden</span>
      </button>
      <button class="option-btn" onclick="selectOne(this,'since','since_7d')">
        <span class="emoji">📅</span><span class="label" data-i18n="since_7d">2–7 Tage</span>
      </button>
      <button class="option-btn" onclick="selectOne(this,'since','since_week')">
        <span class="emoji">🗓️</span><span class="label" data-i18n="since_week">Länger als 1 Woche</span>
      </button>
    </div>
    <button class="next-btn" id="next7" disabled onclick="showSummary()" data-i18n="next">Weiter →</button>
  </div>

  <!-- Screen 8: Zusammenfassung -->
  <div class="screen" id="s8">
    <div class="number-badge" id="wait-number">–</div>
    <div class="number-label" data-i18n="wait_label">Ihre Wartenummer</div>
    <div style="font-size:0.8rem;color:#999;text-align:center;margin-bottom:1rem;padding:0 1rem;border-top:1px solid #eee;padding-top:1rem;" data-i18n="for_staff">Für das Personal</div>
    <div class="summary-card">
      <div class="summary-label" data-i18n="sum_patient">Patient</div>
      <div class="summary-value" id="sum-who">–</div>
    </div>
    <div class="summary-card">
      <div class="summary-label" data-i18n="sum_complaint">Beschwerden</div>
      <div class="summary-value" id="sum-zone">–</div>
    </div>
    <div class="summary-card">
      <div class="summary-label" data-i18n="sum_symptom">Leitsymptom</div>
      <div class="summary-value" id="sum-followup">–</div>
    </div>
    <div class="summary-card">
      <div class="summary-label" data-i18n="sum_pain">Schmerz</div>
      <div class="summary-value" id="sum-pain">–</div>
    </div>
    <div class="summary-card">
      <div class="summary-label" data-i18n="sum_since">Seit</div>
      <div class="summary-value" id="sum-since">–</div>
    </div>
    <div class="summary-card">
      <div class="summary-label" data-i18n="sum_causes">Mögliche Ursachen</div>
      <div id="sum-diagnose">–</div>
    </div>
  </div>

</div>

<script>
  const state = {
    lang: 'de', gender: null, age: null, who: null,
    zone: null, followup: [], pain: null, since: null, diagnoses: []
  };

  const T = {
    de: {
      next: 'Weiter →',
      welcome_title: 'Willkommen', welcome_sub: 'Bitte wähle deine Sprache',
      s1_title: 'Wer bist du?',
      who_self: 'Ich selbst', who_child: 'Mein Kind', who_parent: 'Elternteil', who_other: 'Andere Person',
      s2_title: 'Biologisches Geschlecht',
      gender_m: 'Männlich', gender_f: 'Weiblich',
      sage_title: 'Wie alt?',
      age_child: 'Kind (0–12)', age_teen: 'Jugendlich (13–17)', age_adult: 'Erwachsen (18–60)', age_senior: 'Senior (60+)',
      s3_title: 'Wo tut es weh?', zone_hint: 'Bereich antippen',
      zone_Kopf: 'Kopf', zone_Brust: 'Brust', zone_Bauch: 'Bauch',
      zone_LArm: 'Linker Arm', zone_RArm: 'Rechter Arm', zone_LBein: 'Linkes Bein', zone_RBein: 'Rechtes Bein',
      fu_title_Kopf: 'Wie kam der Kopfschmerz?',
      fu_title_Brust: 'Wie fühlt sich der Brustschmerz an?',
      fu_title_Bauch: 'Wann ist es schlimmer?',
      fu_title_arm: 'Was genau spürst du?', fu_title_leg: 'Was genau spürst du?',
      f_sudden: 'Plötzlich wie ein Blitz', f_gradual: 'Schleichend', f_vision: 'Mit Sehstörung', f_nausea: 'Mit Übelkeit',
      f_pressure: 'Druck / Enge', f_stabbing: 'Stechend', f_breath: 'Atemnot dazu', f_radiates: 'Strahlt in Arm aus',
      f_after_eat: 'Nach dem Essen', f_waves: 'In Wellen / Attacken', f_same_spot: 'Immer an selber Stelle', f_wanders: 'Wandert umher',
      f_numb: 'Taubheit', f_burn: 'Brennen', f_swell: 'Schwellung', f_fall: 'Möglicher Sturz', f_burn_red: 'Brennen / Röte',
      s5_title: 'Wie stark sind die Schmerzen?',
      pain_1: 'Kaum (1/10)', pain_3: 'Leicht (3/10)', pain_5: 'Mittel (5/10)',
      pain_7: 'Stark (7/10)', pain_9: 'Sehr stark (9/10)', pain_10: 'Unerträglich (10/10)',
      s6_title: 'Seit wann?',
      since_1h: 'Weniger als 1 Stunde', since_24h: '1–24 Stunden', since_7d: '2–7 Tage', since_week: 'Länger als 1 Woche',
      wait_label: 'Ihre Wartenummer', for_staff: 'Für das Personal',
      sum_patient: 'Patient', sum_complaint: 'Beschwerden', sum_symptom: 'Leitsymptom',
      sum_pain: 'Schmerz', sum_since: 'Seit', sum_causes: 'Mögliche Ursachen',
      no_estimate: 'Keine Einschätzung verfügbar',
      prio_urgent: 'Dringend', prio_likely: 'Wahrscheinlich', prio_possible: 'Möglich',
      d_subarachnoid: 'Subarachnoidalblutung', d_migraine: 'Migräne', d_hypertension_crisis: 'Bluthochdruck-Krise',
      d_tension_headache: 'Spannungskopfschmerz', d_hypertension: 'Bluthochdruck',
      d_heart_attack: 'Herzinfarkt', d_angina: 'Angina Pectoris', d_pulmonary_embolism: 'Lungenembolie',
      d_muscular: 'Muskuläre Ursache', d_reflux: 'Reflux', d_heart_problems: 'Herzprobleme',
      d_biliary_colic: 'Gallenkolik', d_gastric_ulcer: 'Magengeschwür', d_hepatitis: 'Leberentzündung',
      d_kidney_stone: 'Nierenstein', d_bowel_obstruction: 'Darmverschluss',
      d_appendicitis: 'Appendizitis', d_gastritis: 'Gastritis', d_bowel_disease: 'Darmerkrankung',
    },
  };

  function t(key) {
    return (T[state.lang] && T[state.lang][key]) || T['de'][key] || key;
  }

  function applyTranslations() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
      el.textContent = t(el.dataset.i18n);
    });
    document.getElementById('app').dir = state.lang === 'ar' ? 'rtl' : 'ltr';
  }

  const zoneKey = {
    'Kopf': 'zone_Kopf', 'Brust': 'zone_Brust', 'Bauch': 'zone_Bauch',
    'Linker Arm': 'zone_LArm', 'Rechter Arm': 'zone_RArm',
    'Linkes Bein': 'zone_LBein', 'Rechtes Bein': 'zone_RBein',
  };


  function goto(n) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('s' + n).classList.add('active');
    updateProgress(n);
  }

  function updateProgress(n) {
    const total = 8;
    for (let i = 1; i <= total; i++) {
      const el = document.getElementById('prog' + i);
      if (!el) continue;
      el.innerHTML = '';
      for (let j = 1; j < total; j++) {
        const dot = document.createElement('div');
        dot.className = 'progress-dot' + (j <= n ? ' done' : '');
        el.appendChild(dot);
      }
    }
  }

  function showLoading(on) {
    document.getElementById('loading-overlay').classList.toggle('active', on);
  }

  async function selectLang(el) {
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    const lang = el.dataset.lang;

    if (lang === 'de' || T[lang]) {
      state.lang = lang;
      applyTranslations();
      return;
    }

    showLoading(true);
    try {
      const keys = Object.keys(T.de);
      const texts = Object.values(T.de);
      const resp = await fetch('/api/gemini', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'translate', texts, targetLang: lang })
      });
      const data = await resp.json();
      if (!resp.ok || !data.translated) throw new Error(data.error || 'API error');
      T[lang] = {};
      keys.forEach((k, i) => { T[lang][k] = data.translated[i]; });
      state.lang = lang;
      applyTranslations();
    } catch (err) {
      console.error('Translation failed:', err);
      state.lang = lang;
    } finally {
      showLoading(false);
    }
  }

  function selectOne(el, key, value) {
    const parent = el.parentElement;
    parent.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    state[key] = value;
    if (key === 'who') checkNext1();
    if (key === 'since') document.getElementById('next7').disabled = false;
  }

  function checkNext1() {
    document.getElementById('next1').disabled = !state.who;
  }

  function selectGender2(el, key) {
    document.querySelectorAll('#s2 .bio-gender-btn').forEach(b => {
      b.classList.remove('selected');
      b.style.borderColor = '';
    });
    el.classList.add('selected');
    el.style.borderColor = el.dataset.color;
    state.gender = key;
    checkNext2();
  }

  function checkNext2() {
    document.getElementById('next2').disabled = !state.gender;
  }

  function selectAge(el, key) {
    document.querySelectorAll('#s3 .option-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    state.age = key;
    checkNext3();
  }

  function checkNext3() {
    document.getElementById('next3').disabled = !state.age;
  }

  function selectZone(el, zone) {
    document.querySelectorAll('.zone').forEach(z => z.classList.remove('selected'));
    el.classList.add('selected');
    state.zone = zone;
    document.getElementById('zone-hint').textContent = t(zoneKey[zone]);
    document.getElementById('next4').disabled = false;
  }

  async function gotoFollowup() {
    showLoading(true);
    try {
      const bodyPart = T.de[zoneKey[state.zone]];
      const resp = await fetch('/api/gemini', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'questions', bodyPart, lang: state.lang })
      });
      const data = await resp.json();
      if (!resp.ok || !data.questions) throw new Error(data.error || 'API error');

      document.getElementById('followup-title').textContent = t(zoneKey[state.zone]);
      const grid = document.getElementById('followup-grid');
      grid.innerHTML = '';
      state.followup = [];
      data.questions.forEach(q => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = `<span class="emoji">${q.emoji}</span><span class="label">${q.label}</span>`;
        btn.onclick = function() {
          btn.classList.toggle('selected');
          if (btn.classList.contains('selected')) {
            state.followup.push(q.label);
          } else {
            state.followup = state.followup.filter(f => f !== q.label);
          }
          document.getElementById('next5').disabled = state.followup.length === 0;
        };
        grid.appendChild(btn);
      });
      document.getElementById('next5').disabled = true;
      goto(5);
    } catch (err) {
      console.error('Questions failed:', err);
      goto(6);
    } finally {
      showLoading(false);
    }
  }

  async function gotoFromFollowup() {
    showLoading(true);
    try {
      const bodyPart = T.de[zoneKey[state.zone]];
      const resp = await fetch('/api/gemini', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'diagnose', bodyPart, symptoms: state.followup, lang: state.lang })
      });
      const data = await resp.json();
      if (!resp.ok || !data.diagnoses) throw new Error(data.error || 'API error');
      state.diagnoses = data.diagnoses;
    } catch (err) {
      console.error('Diagnose failed:', err);
      state.diagnoses = [];
    } finally {
      showLoading(false);
      goto(6);
    }
  }

  function selectPain(el, key) {
    document.querySelectorAll('.face-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    state.pain = key;
    document.getElementById('next6').disabled = false;
  }

  function renderDiagnoses() {
    if (!state.diagnoses || state.diagnoses.length === 0) {
      return `<span style="color:#999">${t('no_estimate')}</span>`;
    }
    return state.diagnoses.map((d, i) =>
      `<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:0.9rem;">
        <span>${i + 1}. ${d.name}</span>
        <span style="color:#999">${d.likelihood}</span>
      </div>`
    ).join('<hr style="border:none;border-top:1px solid #eee;">');
  }

  function showSummary() {
    const num = Math.floor(Math.random() * 89) + 10;
    document.getElementById('wait-number').textContent = num;
    const genderAge = [state.gender, state.age].filter(Boolean).map(k => t(k)).join(' · ');
    document.getElementById('sum-who').textContent = [genderAge, t(state.who)].filter(Boolean).join(' · ') || '–';
    document.getElementById('sum-zone').textContent = state.zone ? t(zoneKey[state.zone]) : '–';
    document.getElementById('sum-followup').textContent = state.followup.length > 0
      ? state.followup.join(', ') : '–';
    document.getElementById('sum-pain').textContent = state.pain ? t(state.pain) : '–';
    document.getElementById('sum-since').textContent = state.since ? t(state.since) : '–';
    document.getElementById('sum-diagnose').innerHTML = renderDiagnoses();
    goto(8);
  }

  function resetApp() {
    state.lang = 'de';
    state.gender = null;
    state.age = null;
    state.who = null;
    state.zone = null;
    state.followup = [];
    state.diagnoses = [];
    state.pain = null;
    state.since = null;

    ['next1','next2','next3','next4','next5','next6','next7'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.disabled = true;
    });

    document.querySelectorAll('.option-btn, .bio-gender-btn, .face-btn, .zone').forEach(el => {
      el.classList.remove('selected');
    });
    document.querySelectorAll('.bio-gender-btn').forEach(b => { b.style.borderColor = ''; });

    document.querySelectorAll('.lang-btn').forEach(b => {
      b.classList.toggle('selected', b.dataset.lang === 'de');
    });

    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('s0').classList.add('active');
    updateProgress(0);
    applyTranslations();
  }

  window.onload = resetApp;
</script>
</body>
</html>
